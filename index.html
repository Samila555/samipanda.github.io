<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/samipanda.github.io/logo-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <title>Smart Menu</title>
  <script type="module" crossorigin src="/samipanda.github.io/assets/index-OTSsnbtA.js"></script>
  <link rel="stylesheet" crossorigin href="/samipanda.github.io/assets/index-CCom1Wsq.css">
</head>

<body>
  <div id="root"></div>
  <div id="google_translate_element" style="position:absolute;top:-9999px;left:-9999px;opacity:0;pointer-events:none;">
  </div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,am',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }

    // Aggressively remove all injected Google Translate UI junk
    function removeGoogleTranslateJunk() {
      // Remove the floating Google bubble / speech button
      document.querySelectorAll('div.skiptranslate, iframe.skiptranslate').forEach(el => {
        if (!el.id || el.id !== 'google_translate_element') {
          el.style.display = 'none';
          el.style.visibility = 'hidden';
        }
      });
      // Force body top to 0 (Google sets it to 40px)
      document.body.style.top = '0px';
      document.body.style.position = 'static';
    }

    // Run immediately and watch for future injections
    const observer = new MutationObserver(removeGoogleTranslateJunk);
    document.addEventListener('DOMContentLoaded', () => {
      removeGoogleTranslateJunk();
      observer.observe(document.body, { childList: true, subtree: true });
    });
    setTimeout(removeGoogleTranslateJunk, 500);
    setTimeout(removeGoogleTranslateJunk, 1500);
    setTimeout(removeGoogleTranslateJunk, 3000);
  </script>
  <script type="text/javascript"
    src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>

</html>
